[variables]
NIXPACKS_PHP_VERSION = "8.4"

[phases.install]
cmds = [
  'composer install --optimize-autoloader --no-dev --no-interaction',
  'npm ci --omit=dev',
  'npm run build'
]

[phases.build]
cmds = [
  'php artisan config:cache',
  'php artisan route:cache',
  'php artisan view:cache'
]

[start]
cmd = 'php artisan serve --host=0.0.0.0 --port=$PORT'
